<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3"/>
      <stop offset="100%" style="stop-color:#0D47A1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="96" height="96" rx="14" fill="url(#bg)"/>

  <!-- Grid/Table representing translation grid -->
  <rect x="12" y="18" width="72" height="52" rx="4" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>

  <!-- Header row background -->
  <rect x="12" y="18" width="72" height="16" rx="4" fill="rgba(255,255,255,0.18)"/>
  <rect x="12" y="30" width="72" height="4" rx="0" fill="url(#bg)"/>

  <!-- Vertical divider -->
  <line x1="48" y1="18" x2="48" y2="70" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

  <!-- Horizontal row lines -->
  <line x1="12" y1="34" x2="84" y2="34" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <line x1="12" y1="48" x2="84" y2="48" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

  <!-- Header: EN | VI -->
  <text x="30" y="30" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1">EN</text>
  <text x="66" y="30" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFD740" text-anchor="middle" letter-spacing="1">VI</text>

  <!-- Row 1: text lines -->
  <rect x="18" y="39" width="22" height="3" rx="1.5" fill="rgba(255,255,255,0.5)"/>
  <rect x="54" y="39" width="18" height="3" rx="1.5" fill="rgba(255,215,64,0.5)"/>

  <!-- Row 2: text lines -->
  <rect x="18" y="53" width="16" height="3" rx="1.5" fill="rgba(255,255,255,0.5)"/>
  <rect x="54" y="53" width="22" height="3" rx="1.5" fill="rgba(255,215,64,0.5)"/>

  <!-- Row 3: text lines -->
  <rect x="18" y="62" width="20" height="3" rx="1.5" fill="rgba(255,255,255,0.35)"/>
  <rect x="54" y="62" width="14" height="3" rx="1.5" fill="rgba(255,215,64,0.35)"/>

  <!-- Edit pencil badge (bottom-right) -->
  <circle cx="76" cy="78" r="14" fill="#FFD740" stroke="#0D47A1" stroke-width="2"/>
  <g transform="translate(76,78)">
    <!-- Pencil icon -->
    <path d="M-5 2 L3 -6 L6 -3 L-2 5 L-6 6 Z" fill="#0D47A1"/>
    <path d="M3 -6 L5 -8 L8 -5 L6 -3 Z" fill="#1565C0"/>
    <path d="M-5 2 L-6 6 L-2 5 Z" fill="#0D47A1"/>
  </g>
</svg>
